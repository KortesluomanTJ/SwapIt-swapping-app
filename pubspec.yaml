name: swapit
version: 0.1.0+1
description: SwapIt MVP - swap-only marketplace for iOS, Android and Web.
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
