name: Flutter CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release --dart-define=SUPABASE_URL=dummy --dart-define=SUPABASE_ANON_KEY=dummy
